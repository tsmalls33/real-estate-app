<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Real estate property management portal" />
    <title>Real Estate</title>
    <script>
      // Set the theme attribute before first paint to avoid a light-mode flash.
      // Mirrors ThemeContext: 'theme-mode' is LIGHT | DARK | SYSTEM (or unset).
      (function () {
        try {
          var m = localStorage.getItem('theme-mode');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = m === 'DARK' || ((m === 'SYSTEM' || !m) && prefersDark);
          document.documentElement.dataset.theme = dark ? 'dark' : 'light';
        } catch (err) {}
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
