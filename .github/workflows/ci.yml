name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # pnpm 10 skips dependency build scripts, so @prisma/client is not
      # generated on install. Generate it explicitly (reads the schema only,
      # no DATABASE_URL needed) before anything imports @prisma/client.
      - name: Generate Prisma client
        run: pnpm --filter @RealEstate/backend exec prisma generate

      - name: Build types
        run: pnpm --filter @RealEstate/types run build

      - name: Build backend
        run: pnpm --filter @RealEstate/backend run build

      - name: Test backend
        run: pnpm --filter @RealEstate/backend run test

  backend-integration:
    runs-on: ubuntu-latest
    # API integration tests run against a real Postgres. Kept as a dedicated
    # job so the `backend` unit job stays DB-free.
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/real-estate-test-db?schema=public
      BCRYPT_SALT_ROUNDS: "10"
      JWT_SECRET: test-jwt-secret
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: test-jwt-refresh-secret
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: "3001"
      FRONTEND_URL: http://localhost:3000
    services:
      postgres:
        image: postgres:17.5-alpine3.22
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: real-estate-test-db
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # pnpm 10 skips dependency build scripts, so generate @prisma/client
      # explicitly before migrations or anything that imports it.
      - name: Generate Prisma client
        run: pnpm --filter @RealEstate/backend exec prisma generate

      - name: Build types
        run: pnpm --filter @RealEstate/types run build

      # Apply committed migrations to the test DB (prod parity), after generate.
      - name: Apply migrations
        run: pnpm --filter @RealEstate/backend exec prisma migrate deploy

      - name: Integration tests
        run: pnpm --filter @RealEstate/backend run test:integration

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ESLint (backend uses type-aware rules) needs types available.
      - name: Build types
        run: pnpm --filter @RealEstate/types run build

      # Backend lint reads Prisma-generated types via projectService: true.
      - name: Generate Prisma client
        run: pnpm --filter @RealEstate/backend exec prisma generate

      - name: Lint all packages
        run: pnpm run lint

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Frontend imports @RealEstate/types (its compiled output), so build it first.
      - name: Build types
        run: pnpm --filter @RealEstate/types run build

      # react-scripts 5 (CRA) drives ESLint with options removed in ESLint 9,
      # which is hoisted into the workspace by the backend. Lint runs in its
      # own job (the `lint` step above) using the flat config directly.
      - name: Build frontend
        env:
          DISABLE_ESLINT_PLUGIN: "true"
        run: pnpm --filter @RealEstate/frontend run build

      - name: Test frontend
        run: pnpm --filter @RealEstate/frontend run test
