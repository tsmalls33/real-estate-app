name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # pnpm 10 skips dependency build scripts, so @prisma/client is not
      # generated on install. Generate it explicitly (reads the schema only,
      # no DATABASE_URL needed) before anything imports @prisma/client.
      - name: Generate Prisma client
        run: pnpm --filter @RealEstate/backend exec prisma generate

      - name: Build types
        run: pnpm --filter @RealEstate/types run build

      - name: Build backend
        run: pnpm --filter @RealEstate/backend run build

      # react-scripts 5 (CRA) drives ESLint with options removed in ESLint 9,
      # which is hoisted into the workspace by the backend. Lint is out of
      # scope as a CI gate for now, so disable CRA's lint pass — the build
      # still type-checks and bundles.
      - name: Build frontend
        env:
          DISABLE_ESLINT_PLUGIN: "true"
        run: pnpm --filter @RealEstate/frontend run build

      - name: Test backend
        run: pnpm --filter @RealEstate/backend run test

      - name: Test frontend
        run: pnpm --filter @RealEstate/frontend run test
